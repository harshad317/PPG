<svg width="1200" height="540" viewBox="0 0 1200 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PPG architecture pipeline</title>
  <desc id="desc">The architecture routes inputs through feature extraction, guards, LinUCB, prompt assembly, LM calls, reward computation, credit assignment, and evaluation calibration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="0.58" stop-color="#F0FDFA"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="540" rx="26" fill="url(#bg)"/>
  <text x="64" y="70" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="900">Runtime architecture</text>
  <text x="66" y="105" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">PPG-fast makes one LM call; production mode can add escalation and richer feedback.</text>

  <g filter="url(#shadow)">
    <rect x="56" y="166" width="136" height="86" rx="14" fill="#BFDBFE"/>
    <text x="91" y="201" fill="#1E3A8A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">Input</text>
    <text x="89" y="228" fill="#1D4ED8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">raw task x</text>

    <rect x="228" y="166" width="160" height="86" rx="14" fill="#BBF7D0"/>
    <text x="258" y="201" fill="#064E3B" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">Features</text>
    <text x="250" y="228" fill="#166534" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">length, constraints</text>

    <rect x="424" y="166" width="152" height="86" rx="14" fill="#FDE68A"/>
    <text x="466" y="201" fill="#713F12" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">Guards</text>
    <text x="455" y="228" fill="#92400E" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">w.phi &gt;= bias</text>

    <rect x="612" y="166" width="152" height="86" rx="14" fill="#DDD6FE"/>
    <text x="650" y="201" fill="#3B0764" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">LinUCB</text>
    <text x="637" y="228" fill="#5B21B6" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">select edge arm</text>

    <rect x="800" y="166" width="152" height="86" rx="14" fill="#FBCFE8"/>
    <text x="832" y="201" fill="#831843" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">Assembler</text>
    <text x="824" y="228" fill="#BE185D" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">render path</text>

    <rect x="988" y="166" width="152" height="86" rx="14" fill="#FED7AA"/>
    <text x="1030" y="201" fill="#7C2D12" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">LM</text>
    <text x="1011" y="228" fill="#9A3412" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">complete prompt</text>
  </g>

  <path d="M192 209 H214" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M388 209 H410" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M576 209 H598" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M764 209 H786" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M952 209 H974" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="132" y="344" width="188" height="88" rx="14" fill="#E0F2FE"/>
    <text x="174" y="380" fill="#164E63" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">Reward</text>
    <text x="159" y="408" fill="#155E75" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">task, cost, variance</text>

    <rect x="372" y="344" width="188" height="88" rx="14" fill="#DCFCE7"/>
    <text x="418" y="380" fill="#14532D" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">LOO Credit</text>
    <text x="405" y="408" fill="#166534" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">fragment utility</text>

    <rect x="612" y="344" width="188" height="88" rx="14" fill="#FFEDD5"/>
    <text x="654" y="380" fill="#7C2D12" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">Update</text>
    <text x="641" y="408" fill="#9A3412" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">arms and guards</text>

    <rect x="852" y="344" width="216" height="88" rx="14" fill="#F3E8FF"/>
    <text x="899" y="380" fill="#581C87" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">Calibrate/Eval</text>
    <text x="885" y="408" fill="#6D28D9" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">path search and baselines</text>
  </g>

  <path d="M1064 252 C1060 312 260 288 226 338" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M320 388 H358" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M560 388 H598" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M800 388 H838" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M706 344 C686 302 688 286 688 257" stroke="#475569" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 8" marker-end="url(#arrow)"/>

  <rect x="850" y="70" width="286" height="42" rx="21" fill="#0F172A"/>
  <text x="878" y="97" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900">Default: PPG-fast, one LM call</text>
</svg>
