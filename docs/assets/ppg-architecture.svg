<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PPG architecture pipeline</title>
  <desc id="desc">Architecture diagram generated from the current code modules: data fragments, core graph and executor, bandit policy, training, LM clients, evaluation harness, and benchmark loaders.</desc>
  <defs>
    <filter id="shadow" x="-14%" y="-18%" width="128%" height="136%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="620" rx="24" fill="#F8FAFC"/>
  <text x="62" y="72" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="900">Runtime And Training Architecture</text>
  <text x="64" y="106" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">The same graph runtime powers quick inference, training episodes, validation path search, and benchmark evaluation.</text>

  <g filter="url(#shadow)">
    <rect x="66" y="156" width="210" height="120" rx="12" fill="#DBEAFE" stroke="#93C5FD"/>
    <text x="92" y="196" fill="#1E3A8A" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">ppg/data</text>
    <text x="92" y="226" fill="#1D4ED8" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">fragments.py</text>
    <text x="92" y="250" fill="#1D4ED8" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">7 graph domains</text>

    <rect x="356" y="156" width="210" height="120" rx="12" fill="#E0F2FE" stroke="#7DD3FC"/>
    <text x="382" y="196" fill="#075985" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">ppg/core</text>
    <text x="382" y="226" fill="#0369A1" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">graph.py, features.py</text>
    <text x="382" y="250" fill="#0369A1" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">executor.py</text>

    <rect x="646" y="156" width="210" height="120" rx="12" fill="#FEF3C7" stroke="#FCD34D"/>
    <text x="672" y="196" fill="#78350F" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">ppg/bandits</text>
    <text x="672" y="226" fill="#A16207" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">linucb.py</text>
    <text x="672" y="250" fill="#A16207" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">edge-factored arms</text>

    <rect x="936" y="156" width="210" height="120" rx="12" fill="#FCE7F3" stroke="#F9A8D4"/>
    <text x="962" y="196" fill="#831843" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">ppg/lm</text>
    <text x="962" y="226" fill="#BE185D" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">OpenAI, Anthropic</text>
    <text x="962" y="250" fill="#BE185D" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">disk cache, counters</text>
  </g>

  <path d="M286 216 H344" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M576 216 H634" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M866 216 H924" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="130" y="366" width="250" height="132" rx="12" fill="#D1FAE5" stroke="#6EE7B7"/>
    <text x="160" y="406" fill="#064E3B" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="900">ppg/training</text>
    <text x="160" y="438" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">reward.py, credit.py</text>
    <text x="160" y="462" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">trainer.py, reflection.py</text>

    <rect x="475" y="366" width="250" height="132" rx="12" fill="#EDE9FE" stroke="#C4B5FD"/>
    <text x="505" y="406" fill="#4C1D95" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="900">ppg/eval</text>
    <text x="505" y="438" fill="#6D28D9" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">harness.py</text>
    <text x="505" y="462" fill="#6D28D9" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">path_search.py, external.py</text>

    <rect x="820" y="366" width="250" height="132" rx="12" fill="#FFEDD5" stroke="#FDBA74"/>
    <text x="850" y="406" fill="#7C2D12" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="900">benchmarks</text>
    <text x="850" y="438" fill="#9A3412" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">10 loader classes</text>
    <text x="850" y="462" fill="#9A3412" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">9 runner targets</text>
  </g>

  <path d="M461 288 C395 318 314 330 260 356" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M750 288 C710 322 650 334 610 356" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1040 288 C1024 324 982 338 950 356" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M392 432 H463" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M738 432 H808" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(246 548)">
    <rect x="0" y="0" width="708" height="38" rx="19" fill="#0F172A"/>
    <text x="32" y="25" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">scripts/run_benchmark.py wires loaders, graph fallbacks, LM clients, PPG training, baselines, and result JSON.</text>
  </g>
</svg>
