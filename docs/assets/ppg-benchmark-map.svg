<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PPG benchmark support map</title>
  <desc id="desc">Benchmark map generated from the current runner, loader classes, and fragment graph registry. Runner support includes nine targets, with seven dedicated fragment graphs and two fallbacks.</desc>
  <defs>
    <filter id="shadow" x="-14%" y="-16%" width="128%" height="132%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="640" rx="24" fill="#F8FAFC"/>
  <text x="64" y="74" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="900">Benchmark Support</text>
  <text x="66" y="108" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Runner targets, loader-only support, and fragment graph fallbacks from the current code.</text>

  <g filter="url(#shadow)">
    <rect x="74" y="152" width="322" height="354" rx="14" fill="#DBEAFE" stroke="#93C5FD"/>
    <text x="104" y="194" fill="#1E3A8A" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">Dedicated Graphs</text>
    <text x="104" y="226" fill="#1D4ED8" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">from ppg/data/fragments.py</text>
    <text x="104" y="270" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">GSM8K</text>
    <text x="104" y="300" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">IFBench</text>
    <text x="104" y="330" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">TruthfulQA</text>
    <text x="104" y="360" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">ARC-Challenge</text>
    <text x="104" y="390" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">LiveBench Math</text>
    <text x="104" y="420" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">HotpotQA</text>
    <text x="104" y="450" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">MBPP</text>

    <rect x="440" y="152" width="322" height="354" rx="14" fill="#D1FAE5" stroke="#6EE7B7"/>
    <text x="470" y="194" fill="#064E3B" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">Runner Targets</text>
    <text x="470" y="226" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">from scripts/run_benchmark.py</text>
    <text x="470" y="270" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">arc_challenge</text>
    <text x="470" y="300" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">drop</text>
    <text x="470" y="330" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">gsm8k</text>
    <text x="470" y="360" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">hotpotqa</text>
    <text x="470" y="390" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">ifbench</text>
    <text x="470" y="420" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">livebench_math</text>
    <text x="470" y="450" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">mbpp, mmlu, truthfulqa</text>

    <rect x="806" y="152" width="322" height="354" rx="14" fill="#FEF3C7" stroke="#FCD34D"/>
    <text x="836" y="194" fill="#78350F" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">Fallbacks And Loaders</text>
    <text x="836" y="226" fill="#A16207" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">from _GRAPH_MAP and loaders.py</text>
    <text x="836" y="276" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900">DROP -> HotpotQA graph</text>
    <text x="836" y="310" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900">MMLU -> GSM8K graph</text>
    <text x="836" y="356" fill="#7C2D12" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900">IFEval loader only</text>
    <text x="836" y="390" fill="#92400E" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">not in runner target list</text>
    <text x="836" y="438" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900">Metrics:</text>
    <text x="836" y="468" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">numeric, F1, MCQ, constraints, code tests</text>
  </g>

  <g transform="translate(172 548)">
    <rect x="0" y="0" width="856" height="44" rx="22" fill="#0F172A"/>
    <text x="32" y="29" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="900">Summary: 10 loader classes, 9 runnable benchmark names, 7 dedicated fragment graphs, 2 runner graph fallbacks.</text>
  </g>
</svg>
