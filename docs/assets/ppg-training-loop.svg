<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PPG training loop</title>
  <desc id="desc">Training loop from the current trainer: warm-up with random routing, bandit training with LinUCB, fine-tuning, reward computation, credit assignment, guard sync, and optional production features.</desc>
  <defs>
    <filter id="shadow" x="-16%" y="-18%" width="132%" height="136%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="560" rx="24" fill="#F8FAFC"/>
  <text x="64" y="76" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="900">Training Loop</text>
  <text x="66" y="110" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">PPGTrainer cycles examples through three phases, then syncs learned edge weights back to graph guards.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="164" width="270" height="120" rx="12" fill="#DBEAFE" stroke="#93C5FD"/>
    <text x="102" y="204" fill="#1E3A8A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">1. Warm-up</text>
    <text x="102" y="237" fill="#1D4ED8" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">RandomSelector explores edges</text>
    <text x="102" y="261" fill="#1D4ED8" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">offline LinUCB updates</text>

    <rect x="464" y="164" width="270" height="120" rx="12" fill="#D1FAE5" stroke="#6EE7B7"/>
    <text x="494" y="204" fill="#064E3B" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">2. Train</text>
    <text x="494" y="237" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">LinUCB routing with exploration</text>
    <text x="494" y="261" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">reward and LOO credit</text>

    <rect x="856" y="164" width="270" height="120" rx="12" fill="#FEF3C7" stroke="#FCD34D"/>
    <text x="886" y="204" fill="#78350F" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">3. Fine-tune</text>
    <text x="886" y="237" fill="#A16207" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">low-exploration policy</text>
    <text x="886" y="261" fill="#A16207" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">stabilize route utility</text>
  </g>

  <path d="M354 224 H452" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M746 224 H844" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="122" y="370" width="214" height="96" rx="12" fill="#E0F2FE" stroke="#7DD3FC"/>
    <text x="150" y="407" fill="#075985" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">Execute</text>
    <text x="150" y="435" fill="#0369A1" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">path trace per input</text>

    <rect x="388" y="370" width="214" height="96" rx="12" fill="#FCE7F3" stroke="#F9A8D4"/>
    <text x="416" y="407" fill="#831843" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">Reward</text>
    <text x="416" y="435" fill="#BE185D" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">task, constraint, cost</text>

    <rect x="654" y="370" width="214" height="96" rx="12" fill="#EDE9FE" stroke="#C4B5FD"/>
    <text x="682" y="407" fill="#4C1D95" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">Credit</text>
    <text x="682" y="435" fill="#6D28D9" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">fragment utilities</text>

    <rect x="920" y="370" width="214" height="96" rx="12" fill="#DCFCE7" stroke="#86EFAC"/>
    <text x="948" y="407" fill="#14532D" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">Sync</text>
    <text x="948" y="435" fill="#15803D" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">guards and checkpoints</text>
  </g>

  <path d="M348 418 H376" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M614 418 H642" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M880 418 H908" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1028 358 C994 325 910 314 866 294" stroke="#64748B" stroke-width="3" stroke-dasharray="8 8" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M229 358 C204 332 204 316 207 294" stroke="#64748B" stroke-width="3" stroke-dasharray="8 8" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g transform="translate(215 505)">
    <rect x="0" y="0" width="770" height="36" rx="18" fill="#0F172A"/>
    <text x="28" y="24" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Production mode can add Pareto reward, GRPO paths, reflection, evolution, branching, semantic features, and parallel workers.</text>
  </g>
</svg>
