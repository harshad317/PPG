<svg width="1200" height="540" viewBox="0 0 1200 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PPG training loop</title>
  <desc id="desc">The PPG trainer runs warm-up, LinUCB training, optional production feedback, fine-tuning, guard sync, validation path calibration, and matched-budget evaluation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="0.52" stop-color="#F0FDF4"/>
      <stop offset="1" stop-color="#FEF3C7"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1200" height="540" rx="26" fill="url(#bg)"/>
  <text x="64" y="70" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="900">Training loop</text>
  <text x="66" y="105" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">Three core phases plus optional production feedback and validation calibration.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="164" width="166" height="100" rx="16" fill="#BFDBFE"/>
    <text x="105" y="203" fill="#1E3A8A" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">Warm-up</text>
    <text x="100" y="233" fill="#1D4ED8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">random routes</text>

    <rect x="284" y="164" width="166" height="100" rx="16" fill="#BBF7D0"/>
    <text x="326" y="203" fill="#064E3B" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">Train</text>
    <text x="314" y="233" fill="#166534" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">LinUCB explore</text>

    <rect x="498" y="164" width="204" height="100" rx="16" fill="#DDD6FE"/>
    <text x="538" y="203" fill="#3B0764" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">Feedback</text>
    <text x="528" y="233" fill="#5B21B6" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">credit, GRPO, Pareto</text>

    <rect x="750" y="164" width="166" height="100" rx="16" fill="#FDE68A"/>
    <text x="789" y="203" fill="#713F12" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">Fine-tune</text>
    <text x="777" y="233" fill="#92400E" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">low exploration</text>

    <rect x="964" y="164" width="166" height="100" rx="16" fill="#FED7AA"/>
    <text x="1005" y="203" fill="#7C2D12" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">Evaluate</text>
    <text x="996" y="233" fill="#9A3412" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">matched budget</text>
  </g>

  <path d="M236 214 H270" stroke="#334155" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M450 214 H484" stroke="#334155" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M702 214 H736" stroke="#334155" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M916 214 H950" stroke="#334155" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="102" y="336" width="996" height="104" rx="18" fill="#FFFFFF" fill-opacity="0.94"/>
    <text x="138" y="374" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">Signals used during learning</text>

    <rect x="404" y="356" width="112" height="42" rx="12" fill="#DBEAFE"/>
    <text x="432" y="382" fill="#1E3A8A" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900">task</text>

    <rect x="536" y="356" width="112" height="42" rx="12" fill="#DCFCE7"/>
    <text x="565" y="382" fill="#166534" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900">cost</text>

    <rect x="668" y="356" width="136" height="42" rx="12" fill="#FAE8FF"/>
    <text x="696" y="382" fill="#86198F" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900">variance</text>

    <rect x="824" y="356" width="146" height="42" rx="12" fill="#FFEDD5"/>
    <text x="849" y="382" fill="#9A3412" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900">constraints</text>

    <text x="138" y="414" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">Production mode can add reflection, fragment evolution, and failure-mode branching.</text>
  </g>

  <path d="M1048 264 C1032 304 998 317 936 336" stroke="#334155" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <path d="M597 336 C555 296 464 285 369 265" stroke="#334155" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <path d="M1046 440 C984 498 216 498 152 266" stroke="#334155" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
</svg>
