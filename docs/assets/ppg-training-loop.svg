<svg width="1200" height="540" viewBox="0 0 1200 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PPG training loop</title>
  <desc id="desc">A colorful training loop showing warm-up, bandit training, fine-tuning, guard sync, evaluation, and reward components.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5F3FF"/>
      <stop offset="0.55" stop-color="#ECFDF5"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1200" height="540" rx="26" fill="url(#bg)"/>
  <text x="64" y="70" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="900">Training loop</text>
  <text x="66" y="105" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="600">PPG starts broad, learns edge rewards, then freezes a deployable guard policy.</text>

  <g filter="url(#shadow)">
    <circle cx="285" cy="245" r="82" fill="#38BDF8"/>
    <text x="236" y="237" fill="#082F49" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">Warm-up</text>
    <text x="226" y="268" fill="#0C4A6E" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">random routing</text>

    <circle cx="515" cy="245" r="82" fill="#A78BFA"/>
    <text x="461" y="237" fill="#2E1065" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">Train</text>
    <text x="456" y="268" fill="#4C1D95" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">LinUCB explore</text>

    <circle cx="745" cy="245" r="82" fill="#FBBF24"/>
    <text x="696" y="237" fill="#713F12" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">Fine-tune</text>
    <text x="687" y="268" fill="#78350F" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">low exploration</text>

    <circle cx="975" cy="245" r="82" fill="#34D399"/>
    <text x="920" y="237" fill="#064E3B" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">Evaluate</text>
    <text x="914" y="268" fill="#065F46" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">matched budget</text>
  </g>

  <path d="M368 245 H419" stroke="#334155" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M598 245 H649" stroke="#334155" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M828 245 H879" stroke="#334155" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M972 327 C930 418 372 418 300 330" stroke="#334155" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="120" y="382" width="960" height="88" rx="24" fill="#FFFFFF" fill-opacity="0.92"/>
    <text x="156" y="420" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">Reward signal</text>
    <rect x="342" y="399" width="126" height="40" rx="20" fill="#DBEAFE"/>
    <text x="372" y="425" fill="#1E3A8A" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">task</text>
    <rect x="492" y="399" width="126" height="40" rx="20" fill="#DCFCE7"/>
    <text x="527" y="425" fill="#166534" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">cost</text>
    <rect x="642" y="399" width="156" height="40" rx="20" fill="#FAE8FF"/>
    <text x="672" y="425" fill="#86198F" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">variance</text>
    <rect x="822" y="399" width="176" height="40" rx="20" fill="#FFEDD5"/>
    <text x="852" y="425" fill="#9A3412" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">constraints</text>
  </g>
</svg>
