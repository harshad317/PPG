<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PPG method stack</title>
  <desc id="desc">The implemented method stack: graph construction, feature extraction, guard-gated routing, prompt assembly, LM completion, reward, credit, and policy updates.</desc>
  <defs>
    <filter id="shadow" x="-16%" y="-18%" width="132%" height="136%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="520" rx="24" fill="#F8FAFC"/>
  <text x="64" y="78" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="900">Method Stack</text>
  <text x="66" y="112" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Prompt optimization is represented as a route policy over typed fragment graphs.</text>

  <g filter="url(#shadow)">
    <rect x="66" y="162" width="206" height="118" rx="12" fill="#DBEAFE" stroke="#93C5FD"/>
    <text x="92" y="202" fill="#1E3A8A" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="900">Build Graph</text>
    <text x="92" y="233" fill="#1D4ED8" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">PromptFragment</text>
    <text x="92" y="256" fill="#1D4ED8" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">PPGraphBuilder</text>

    <rect x="354" y="162" width="206" height="118" rx="12" fill="#D1FAE5" stroke="#6EE7B7"/>
    <text x="380" y="202" fill="#064E3B" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="900">Read State</text>
    <text x="380" y="233" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">FeatureExtractor</text>
    <text x="380" y="256" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">14-dim phi vector</text>

    <rect x="642" y="162" width="206" height="118" rx="12" fill="#FEF3C7" stroke="#FCD34D"/>
    <text x="668" y="202" fill="#78350F" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="900">Route Path</text>
    <text x="668" y="233" fill="#A16207" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Guard.evaluate</text>
    <text x="668" y="256" fill="#A16207" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">LinUCBPolicy.select</text>

    <rect x="930" y="162" width="206" height="118" rx="12" fill="#FCE7F3" stroke="#F9A8D4"/>
    <text x="956" y="202" fill="#831843" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="900">Call LM</text>
    <text x="956" y="233" fill="#BE185D" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">PromptAssembler</text>
    <text x="956" y="256" fill="#BE185D" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">LMClient.complete</text>
  </g>

  <path d="M282 221 H342" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M570 221 H630" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M858 221 H918" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="204" y="350" width="250" height="104" rx="12" fill="#E0F2FE" stroke="#7DD3FC"/>
    <text x="232" y="390" fill="#075985" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">Score Route</text>
    <text x="232" y="421" fill="#0369A1" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">task, constraints, cost, variance</text>

    <rect x="510" y="350" width="250" height="104" rx="12" fill="#EDE9FE" stroke="#C4B5FD"/>
    <text x="538" y="390" fill="#4C1D95" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">Assign Credit</text>
    <text x="538" y="421" fill="#6D28D9" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">leave-one-out fragment utility</text>

    <rect x="816" y="350" width="250" height="104" rx="12" fill="#DCFCE7" stroke="#86EFAC"/>
    <text x="844" y="390" fill="#14532D" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">Update Policy</text>
    <text x="844" y="421" fill="#15803D" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">edge arms and guard weights</text>
  </g>

  <path d="M1033 292 C1033 325 950 324 940 344" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M466 402 H498" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M772 402 H804" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M840 347 C714 310 536 310 428 292" stroke="#64748B" stroke-width="3" stroke-dasharray="8 8" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>
